<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码验证</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: sans-serif;
    gap: 20px;
}
h2 { color: #fff; font-size: 1.5rem; }
input {
    padding: 12px 20px;
    border: 2px solid #444;
    border-radius: 25px;
    background: #222;
    color: #fff;
    font-size: 1rem;
    outline: none;
    width: 220px;
    text-align: center;
}
input:focus { border-color: #667eea; }
button {
    padding: 12px 40px;
    border: none;
    border-radius: 25px;
    background: #667eea;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
}
button:hover { background: #5a6fd6; }
#msg { color: #f5576c; font-size: 0.9rem; min-height: 20px; }
</style>
</head>
<body>
<h2>请输入密码</h2>
<input type="password" id="pwd" placeholder="密码" onkeydown="if(event.key==='Enter')check()">
<button onclick="check()">进入</button>
<div id="msg"></div>

<script>
function check() {
    const pwd = document.getElementById("pwd").value;
    if (pwd === "114514") {
        window.location.href = "cjbv3.html";
    } else {
        document.getElementById("msg").textContent = "密码错误";
        document.getElementById("pwd").value = "";
    }
}
</script>
</body>
</html>
